# Development environment
version: '3.8'

services:
  # Database for development
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: watchparty_dev
      POSTGRES_USER: watchparty
      POSTGRES_PASSWORD: watchparty123
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - watchparty-dev

  # Redis for development
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    ports:
      - "6379:6379"
    networks:
      - watchparty-dev

  # Celery Worker for development
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    depends_on:
      - db
      - redis
    environment:
      - DEBUG=True
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./backend:/app
    networks:
      - watchparty-dev
    command: celery -A watchparty worker --loglevel=debug --reload

  # Celery Beat for development
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    depends_on:
      - db
      - redis
    environment:
      - DEBUG=True
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    networks:
      - watchparty-dev
    command: celery -A watchparty beat --loglevel=debug

  # MailHog for email testing
  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - watchparty-dev

volumes:
  postgres_dev_data:
  redis_dev_data:

networks:
  watchparty-dev:
    driver: bridge
