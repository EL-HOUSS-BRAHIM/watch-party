name: Deploy Backend to Production

on:
  push:
    branches: [main]
    paths:
      - 'back-end/**'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production Server
    
    steps:
    - name: 🛎️ Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DEPLOY_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H 13.37.8.163 >> ~/.ssh/known_hosts
        
    - name: 📦 Deploy Backend
      run: |
        # Configuration
        SERVER_IP="13.37.8.163"
        SERVER_USER="ubuntu"
        SSH_KEY="$HOME/.ssh/deploy_key"
        DEPLOY_PATH="/home/ubuntu/brahim/be_watch-party"
        LOCAL_BACKEND_PATH="./back-end"
        
        echo "🚀 Starting Backend Deployment to Production"
        
        # Function to run commands on the server
        run_remote() {
            ssh -i "$SSH_KEY" -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_IP" "$1"
        }
        
        # Function to copy files to server
        copy_to_server() {
            rsync -avz --delete -e "ssh -i $SSH_KEY -o StrictHostKeyChecking=no" "$1" "$SERVER_USER@$SERVER_IP:$2"
        }
        
        echo "📦 Uploading backend code..."
        # Create a temporary directory for deployment
        TEMP_DIR=$(mktemp -d)
        echo "Temporary directory: $TEMP_DIR"
        
        # Copy backend files to temp directory, excluding unnecessary files
        rsync -av \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          --exclude='.env' \
          --exclude='venv' \
          --exclude='node_modules' \
          --exclude='.git' \
          --exclude='db.sqlite3' \
          "$LOCAL_BACKEND_PATH/" "$TEMP_DIR/"
        
        # Upload to server (preserve existing .env and db.sqlite3)
        copy_to_server "$TEMP_DIR/" "$DEPLOY_PATH"
        
        # Clean up temp directory
        rm -rf "$TEMP_DIR"
        
        echo "📚 Installing/updating Python dependencies..."
        run_remote "cd $DEPLOY_PATH && source venv/bin/activate && pip install -r requirements.txt"
        
        echo "🗄️ Running database migrations..."
        run_remote "cd $DEPLOY_PATH && source venv/bin/activate && python manage.py migrate --settings=watchparty.settings.production"
        
        echo "📊 Collecting static files..."
        run_remote "cd $DEPLOY_PATH && source venv/bin/activate && python manage.py collectstatic --noinput --settings=watchparty.settings.production"
        
        echo "🔄 Restarting services..."
        run_remote "sudo systemctl restart watch-party-backend.service"
        run_remote "sudo systemctl restart watch-party-celery-worker.service"
        run_remote "sudo systemctl restart watch-party-celery-beat.service"
        
        echo "✅ Checking service status..."
        run_remote "sudo systemctl is-active watch-party-backend.service"
        run_remote "sudo systemctl is-active watch-party-celery-worker.service"
        run_remote "sudo systemctl is-active watch-party-celery-beat.service"
        
        echo "🔍 Testing deployment..."
        sleep 10  # Wait for services to start
        if run_remote "curl -f https://be-watch-party.brahim-elhouss.me/health/ > /dev/null 2>&1"; then
          echo "🎉 Deployment successful! Backend is healthy."
        else
          echo "❌ Deployment health check failed!"
          exit 1
        fi
        
        echo "🎉 Deployment completed successfully!"
        echo "Backend is running at: https://be-watch-party.brahim-elhouss.me"
        
    - name: 🧹 Cleanup
      if: always()
      run: |
        rm -f ~/.ssh/deploy_key
        
    - name: 📢 Notify on failure
      if: failure()
      run: |
        echo "❌ Deployment failed! Check the logs above for details."
