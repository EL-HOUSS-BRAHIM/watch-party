name: Deploy Watch Party

on:
  push:
    branches: [main, production]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.11'

jobs:
  test-backend:
    runs-on: ubuntu-latest
    name: Test Backend
    
    services:
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('back-end/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        working-directory: ./back-end
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Set up environment variables
        working-directory: ./back-end
        run: |
          cp .env.example .env
          echo "DEBUG=True" >> .env
          echo "SECRET_KEY=test-secret-key-for-ci" >> .env
          echo "DATABASE_URL=sqlite:///test.db" >> .env
          echo "REDIS_URL=redis://localhost:6379/0" >> .env
      
      - name: Run Django tests
        working-directory: ./back-end
        run: |
          python manage.py collectstatic --noinput
          python manage.py migrate
          python manage.py test

  test-frontend:
    runs-on: ubuntu-latest
    name: Test Frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Cache pnpm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('front-end/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      
      - name: Install dependencies
        working-directory: ./front-end
        run: pnpm install --frozen-lockfile
      
      - name: Run linting
        working-directory: ./front-end
        run: pnpm lint
      
      - name: Run tests
        working-directory: ./front-end
        run: |
          # Add test command when you have tests
          echo "No tests configured yet"
      
      - name: Build application
        working-directory: ./front-end
        run: pnpm build

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e
            
            # Navigate to project directory
            cd /home/ubuntu/watch-party
            
            # Pull latest changes
            echo "Pulling latest changes from GitHub..."
            git fetch origin
            git reset --hard origin/main
            
            # Deploy using the unified script
            echo "Running deployment..."
            watch-party deploy
            
            # Verify deployment
            echo "Verifying deployment..."
            watch-party status
            
            echo "Deployment completed successfully!"
          EOF

  notify:
    runs-on: ubuntu-latest
    name: Notify Deployment Status
    needs: [deploy]
    if: always()
    
    steps:
      - name: Notify success
        if: needs.deploy.result == 'success'
        run: |
          echo "🎉 Deployment successful!"
          # Add notification logic here (Slack, Discord, etc.)
      
      - name: Notify failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          # Add notification logic here (Slack, Discord, etc.)
